name: Build dashboard

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "dashboard/**"
      - ".github/workflows/build-dashboard.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: write

env:
  DATA_REPO: synthesis-labs/techteam-reporting-data

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch private data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DATA_REPO }}
          ssh-key: ${{ secrets.DATA_REPO_KEY }}
          path: _data_private

      - name: Stage data into data/
        run: |
          # Private repo layout mirrors what data/ would contain:
          #   <YYYY-MM>/raw/, <YYYY-MM>/standardised/, aliases.csv
          shopt -s nullglob
          mkdir -p data

          # Remove local month folders that are no longer in the private repo.
          for d in data/[0-9][0-9][0-9][0-9]-[0-9][0-9]; do
            [ -d "$d" ] || continue
            m="$(basename "$d")"
            if [ ! -d "_data_private/$m" ]; then
              rm -rf "$d"
            fi
          done

          for d in _data_private/[0-9][0-9][0-9][0-9]-[0-9][0-9]; do
            m="$(basename "$d")"
            mkdir -p "data/$m"
            rsync -a --delete "$d/" "data/$m/"
          done
          if [ -f _data_private/aliases.csv ]; then
            cp _data_private/aliases.csv data/aliases.csv
          fi
          echo "Staged months:"
          ls -1 data | grep -E '^[0-9]{4}-[0-9]{2}$' || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install plotly

      - name: Aggregate history
        run: python data/aggregate.py

      - name: Regenerate snapshot pages + _quarto.yml
        run: python dashboard/build.py

      - name: Regenerate trends.md
        run: python dashboard/build_trends.py

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        working-directory: dashboard
        run: quarto render

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/dashboard
          destination_dir: dashboard
          keep_files: false
